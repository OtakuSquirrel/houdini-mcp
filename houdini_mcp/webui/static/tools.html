<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Tools - Houdini MCP</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --surface: #262626;
      --surface2: #333333;
      --surface3: #3d3d3d;
      --accent: #ff6600;
      --accent-hover: #e55b00;
      --accent-dim: #ba4f25;
      --text: #cccccc;
      --text-dim: #808080;
      --text-bright: #e6e6e6;
      --success: #4caf50;
      --error: #e53935;
      --border: #333333;
      --code-text: #f7956a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo { color: var(--accent); font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
    .logo span { color: var(--text-dim); font-weight: 400; }
    nav { display: flex; gap: 2px; margin-left: 24px; }
    nav a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      padding: 12px 14px;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--accent); border-bottom-color: var(--accent); }
    .spacer { flex: 1; }
    .health-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
    }
    .health-dot.offline { background: var(--error); }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

    /* Summary bar */
    .summary-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .summary-stat { font-size: 13px; color: var(--text-dim); }
    .summary-stat strong { color: var(--text-bright); }
    .summary-actions { margin-left: auto; display: flex; gap: 6px; }

    /* Grid layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 12px;
    }

    /* Tile card */
    .tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .tile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .tile-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-bright);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .tile-count {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .tile-desc {
      font-size: 11px;
      color: var(--text-dim);
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      line-height: 1.4;
    }
    .tile-body { padding: 2px 0; }

    /* Tool row */
    .tool-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      border-bottom: 1px solid rgba(51,51,51,0.5);
    }
    .tool-row:last-child { border-bottom: none; }
    .tool-row:hover { background: rgba(255,255,255,0.02); }
    .tool-info { flex: 1; min-width: 0; }
    .tool-name {
      font-size: 11.5px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      color: var(--code-text);
      line-height: 1.3;
    }
    .tool-name.disabled {
      color: var(--text-dim);
      text-decoration: line-through;
      text-decoration-color: var(--surface3);
    }
    .tool-desc {
      font-size: 10.5px;
      color: var(--text-dim);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Toggle (compact) */
    .toggle {
      position: relative;
      width: 30px; height: 16px;
      background: var(--surface3);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      background: white;
      border-radius: 50%;
      top: 2px; left: 2px;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(14px); }

    /* Buttons */
    .btn {
      padding: 5px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      color: white;
      transition: background 0.15s;
    }
    .btn-accent { background: var(--accent); }
    .btn-accent:hover { background: var(--accent-hover); }
    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }

    .toast {
      position: fixed;
      bottom: 20px; right: 20px;
      background: var(--surface2);
      border: 1px solid var(--accent-dim);
      border-radius: 6px;
      padding: 10px 18px;
      font-size: 13px;
      color: var(--text-bright);
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 100;
    }
    .toast.show { opacity: 1; }

    .empty-state { text-align: center; padding: 24px; color: var(--text-dim); font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <span class="logo">Houdini MCP <span>Manager</span></span>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/config">HouConfig</a>
      <a href="/agent-config">AgentConfig</a>
      <a href="/tools" class="active">MCP Tools</a>
    </nav>
    <div class="spacer"></div>
    <div class="health-dot" id="health-dot"></div>
  </header>

  <div class="container">

    <!-- Summary -->
    <div class="summary-bar">
      <span class="summary-stat"><strong id="stat-enabled">0</strong> / <strong id="stat-total">0</strong> tools enabled — changes take effect immediately, no restart needed</span>
      <div class="summary-actions">
        <button class="btn btn-ghost" onclick="enableAll()">Enable All</button>
        <button class="btn btn-ghost" onclick="disableAll()">Disable All</button>
        <button class="btn btn-accent" onclick="resetDefaults()">Reset to Defaults</button>
      </div>
    </div>

    <!-- Tool grid -->
    <div class="grid" id="tools-container">
      <div class="empty-state">Loading...</div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function api(path, opts = {}) {
      const res = await fetch(path, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
      });
      return res.json();
    }

    // ── Tool Management ──
    let _categories = [];

    async function loadTools() {
      const data = await api('/api/tools');
      _categories = data.categories;
      renderCategories();
      document.getElementById('stat-enabled').textContent = data.total_tools - data.disabled_count;
      document.getElementById('stat-total').textContent = data.total_tools;
    }

    function renderCategories() {
      const container = document.getElementById('tools-container');
      container.innerHTML = _categories.map(cat => {
        const toolRows = cat.tools.map(t => `
          <div class="tool-row">
            <div class="tool-info">
              <div class="tool-name${t.enabled ? '' : ' disabled'}">${t.name}</div>
              <div class="tool-desc">${t.desc || ''}</div>
            </div>
            <div class="toggle${t.enabled ? ' on' : ''}"
                 onclick="toggleTool('${t.name}', ${!t.enabled})"></div>
          </div>
        `).join('');

        return `
          <div class="tile">
            <div class="tile-header">
              <span class="tile-title">${cat.category}</span>
              <span class="tile-count">${cat.enabled_count}/${cat.total_count}</span>
            </div>
            <div class="tile-desc">${cat.desc || ''}</div>
            <div class="tile-body">${toolRows}</div>
          </div>
        `;
      }).join('');
    }

    async function toggleTool(name, enable) {
      await api('/api/tools/toggle', {
        method: 'PUT',
        body: JSON.stringify({ tool_name: name, enabled: enable }),
      });
      showToast(`${name}: ${enable ? 'enabled' : 'disabled'}`);
      loadTools();
    }

    async function enableAll() {
      await api('/api/tools/bulk', {
        method: 'PUT',
        body: JSON.stringify({ disabled_tools: [] }),
      });
      showToast('All tools enabled');
      loadTools();
    }

    async function disableAll() {
      const allNames = [];
      _categories.forEach(c => c.tools.forEach(t => allNames.push(t.name)));
      await api('/api/tools/bulk', {
        method: 'PUT',
        body: JSON.stringify({ disabled_tools: allNames }),
      });
      showToast('All tools disabled');
      loadTools();
    }

    async function resetDefaults() {
      await api('/api/tools/reset', { method: 'POST' });
      showToast('Reset to defaults');
      loadTools();
    }

    // ── Health ──
    async function checkHealth() {
      try {
        const data = await api('/health');
        document.getElementById('health-dot').classList.toggle('offline', data.status !== 'ok');
      } catch { document.getElementById('health-dot').classList.add('offline'); }
    }

    // ── Init ──
    checkHealth();
    loadTools();
    setInterval(checkHealth, 10000);
  </script>
</body>
</html>
